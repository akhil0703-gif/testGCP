name: "Deploy Terraform Infrastructure"

on:
  workflow_dispatch:
    inputs:
      rootFolder:
        description: 'Path to Terraform root directory'
        required: true
        default: './project'
      tfvars:
        description: 'Path to .tfvars file'
        required: true
        default: './project/parameters/dev-terraform.tfvars'
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan' # Changed default to plan
        type: choice
        options:
          - validate
          - fmt
          - plan
          - apply
          - destroy

jobs:
  terraform-gcp-execution: # Renamed job since it is no longer offline
    name: "Execute Terraform Task on GCP"
    runs-on: ubuntu-latest
    
    # CRITICAL: These permissions are required for Workload Identity Federation (Keyless Auth)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # NEW: Keyless Authentication
      - name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          # Replace these placeholders with the string from your Cloud Shell script
          workload_identity_provider: 'projects/257546161875/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com'

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        # Removed -backend=false so it connects to your GCS state bucket
        run: terraform init -upgrade
        working-directory: ${{ github.event.inputs.rootFolder }}

      - name: "Run Terraform Format Check"
        if: ${{ github.event.inputs.action == 'fmt' }}
        run: terraform fmt -check
        working-directory: ${{ github.event.inputs.rootFolder }}

      - name: "Run Terraform Validate"
        if: ${{ github.event.inputs.action == 'validate' }}
        run: terraform validate
        working-directory: ${{ github.event.inputs.rootFolder }}

      # NEW: Terraform Plan
      - name: "Run Terraform Plan"
        if: ${{ github.event.inputs.action == 'plan' }}
        # Notice how it dynamically uses your tfvars input path
        run: terraform plan -var-file="${{ github.event.inputs.tfvars }}"
        working-directory: ${{ github.event.inputs.rootFolder }}

      # NEW: Terraform Apply
      - name: "Run Terraform Apply"
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve -var-file="${{ github.event.inputs.tfvars }}"
        working-directory: ${{ github.event.inputs.rootFolder }}

      # NEW: Terraform Destroy
      - name: "Run Terraform Destroy"
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -var-file="${{ github.event.inputs.tfvars }}"
        working-directory: ${{ github.event.inputs.rootFolder }}
