name: Deploy Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      rootFolder:
        description: 'Path to Terraform root directory'
        required: true
        default: './project'
      tfvars:
        description: 'Path to .tfvars file'
        required: true
        default: './project/parameters/dev-terrafrom.tfvars'
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - validate
          - plan
          - apply
          - destroy

name: "Terraform CI"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-check:
    name: "Lint, Validate and Plan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        # We now need the backend to be initialized so Plan can read the state
        # Note: This requires GCP credentials if your bucket is private
        run: terraform init
        working-directory: ./project

      - name: "Terraform Validate"
        run: terraform validate
        working-directory: ./project

      - name: "Terraform Plan"
        # This shows you the "Dry Run" results in the GitHub Actions logs
        run: |
          terraform plan \
          -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="vpc_name=ci-test-vpc"
        working-directory: ./project
