name: "Deploy Terraform Infrastructure"

on:
  workflow_dispatch:
    inputs:
      rootFolder:
        description: 'Path to Terraform root directory'
        required: true
        default: './project'
      tfvars:
        description: 'Path to .tfvars file'
        required: true
        default: './project/parameters/dev-terraform.tfvars'
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - fmt

jobs:
  terraform-offline-execution:
    name: "Execute Offline Terraform Task"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init (Backend Disabled)"
        # We still need to initialize offline so Terraform downloads the provider plugins
        run: terraform init -backend=false
        # Notice how we use the input variable here dynamically!
        working-directory: ${{ github.event.inputs.rootFolder }}

      - name: "Run Terraform Format Check"
        # This step ONLY runs if you select 'fmt' from the dropdown
        if: ${{ github.event.inputs.action == 'fmt' }}
        run: terraform fmt -check
        working-directory: ${{ github.event.inputs.rootFolder }}

      - name: "Run Terraform Validate"
        # This step ONLY runs if you select 'validate' from the dropdown
        if: ${{ github.event.inputs.action == 'validate' }}
        run: terraform validate
        working-directory: ${{ github.event.inputs.rootFolder }}
