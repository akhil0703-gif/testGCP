steps:
  # Step 1: Initialize Terraform
  - id: 'terraform-init'
    name: 'hashicorp/terraform:latest'
    dir: 'project'
    entrypoint: 'sh'
    args: 
      - '-c'
      - 'terraform init'

  # Step 2: Run Terraform Plan
  - id: 'terraform-plan'
    name: 'hashicorp/terraform:latest'
    dir: 'project'
    entrypoint: 'sh'
    args: 
      - '-c'
      - |
        terraform plan \
        -var="gcp_project_id=${_GCP_PROJECT_ID}" \
        -var="vpc_name=${_VPC_NAME}"

  # Step 3: Run Terraform Apply
  - id: 'terraform-apply'
    name: 'hashicorp/terraform:latest'
    dir: 'project'
    entrypoint: 'sh'
    args: 
      - '-c'
      - |
        terraform apply -auto-approve \
        -var="gcp_project_id=${_GCP_PROJECT_ID}" \
        -var="vpc_name=${_VPC_NAME}"

  # Step 4: Run Terraform Destroy (Use with caution!)
  - id: 'terraform-destroy'
    name: 'hashicorp/terraform:latest'
    dir: 'project'
    entrypoint: 'sh'
    args: 
      - '-c'
      - |
        terraform destroy -auto-approve \
        -var="gcp_project_id=${_GCP_PROJECT_ID}" \
        -var="vpc_name=${_VPC_NAME}"
